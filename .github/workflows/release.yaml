name: Release

on:
  push:
    branches:
      - main

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "version=1.0.${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/aaronmbdev/dobby:${{ steps.version.outputs.version }}
            ghcr.io/aaronmbdev/dobby:latest

  publish-chart:
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package and push Helm chart
        env:
          VERSION: ${{ needs.build-image.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" chart/Chart.yaml
          sed -i "s/^  tag:.*/  tag: ${VERSION}/" chart/values.yaml
          helm package chart
          helm push "dobby-${VERSION}.tgz" oci://ghcr.io/aaronmbdev/charts

  deploy:
    runs-on: ubuntu-latest
    needs: [build-image, publish-chart]
    permissions:
      contents: read
    steps:
      - name: Update ArgoCD targetRevision
        env:
          VERSION: ${{ needs.build-image.outputs.version }}
          GIT_TOKEN: ${{ secrets.TERRADOBBY_TOKEN }}
        run: |
          git clone https://x-access-token:${GIT_TOKEN}@github.com/aaronmbdev/terradobby.git
          cd terradobby
          sed -i "s/targetRevision: \".*\"/targetRevision: \"${VERSION}\"/" apps/dobby/app.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/dobby/app.yaml
          git commit -m "chore: bump dobby to ${VERSION}"
          git push
