replicaCount: 1

image:
  repository: ghcr.io/aaronmbdev/dobby
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

# Name of a pre-existing Kubernetes Secret in the same namespace.
# The chart does NOT create this secret — it must already exist in the cluster.
# Expected keys: DATABASE_URL, OPENAI_API_KEY, HOMEASSISTANT_TOKEN,
#                RESEND_API_KEY, RESEND_FROM_EMAIL, RESEND_TO_EMAIL
existingSecret: "dobby-secrets"

# Non-sensitive configuration
config:
  openaiModel: "gpt-4o"
  openaiEmbeddingModel: "text-embedding-3-small"
  homeassistantUrl: "https://homeassistant.example.com"
  financesUrl: "https://finances.example.com"
  dietUrl: "https://diet.example.com"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10
